<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyFinanceApp</title>
  <style>
    * {
      margin: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .badge {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 999px;
      padding: .25rem .75rem;
      font-size: .8rem;
      color: #94a3b8;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 1rem;
      text-align: center;
    }

    p.tagline {
      color: #94a3b8;
      font-size: 1.15rem;
      text-align: center;
      max-width: 480px;
      margin-bottom: 2.5rem;
    }

    .buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: .75rem 1.75rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity .15s;
    }

    .btn:hover {
      opacity: .85;
    }

    .btn-primary {
      background: #6366f1;
      color: #fff;
    }

    .btn-secondary {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #334155;
    }

    .assets {
      margin-top: 2.5rem;
      display: flex;
      flex-direction: column;
      gap: .5rem;
      align-items: center;
    }

    .asset-link {
      color: #818cf8;
      font-size: .9rem;
      text-decoration: none;
    }

    .asset-link:hover {
      text-decoration: underline;
    }

    #version {
      font-family: monospace;
      color: #6366f1;
    }

    .error {
      color: #f87171;
      font-size: .9rem;
      margin-top: 1rem;
    }
  </style>
</head>

<body>

  <div class="badge">Open Source · Free Forever</div>
  <h1>
    <svg xmlns="http://www.w3.org/2000/svg" class="size-7 stroke-secondary fill-base-content" viewBox="0 0 24 24">
      <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
      <path
        d="M18.36 13.36c-.4.4-.83.75-1.29 1.07l-2.63-5.7c.35-.49.56-1.09.56-1.73 0-1.3-.84-2.4-2-2.82V2h-2v2.18C9.84 4.59 9 5.69 9 7c0 .65.21 1.24.56 1.73l-2.63 5.7c-.46-.31-.89-.67-1.29-1.07l-.71-.71-1.41 1.41.71.71c.57.57 1.19 1.06 1.86 1.49l-2.22 4.81 1.82.84 2.18-4.73c1.32.53 2.71.81 4.14.81s2.82-.27 4.14-.81c1.37-.55 2.59-1.37 3.64-2.42l.71-.71-1.41-1.41-.71.71ZM12 6c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1m-3.3 9.37 2.53-5.48c.25.07.5.11.77.11s.52-.05.77-.11l2.53 5.48c-2.11.83-4.49.83-6.6 0m8.28 3.64 1.34 2.91 1.82-.84-1.38-2.99c-.57.35-1.16.66-1.78.92">
      </path>
    </svg>
    Helm
  </h1>
  <p class="tagline">Take control of your finances. Budgets, investments, and net worth — all on your desktop.</p>

  <div class="buttons">
    <!-- Primary download button — href filled dynamically -->
    <a id="download-btn" class="btn btn-primary" href="#">
      ⬇ Download <span id="version">…</span>
    </a>
    <a href="https://github.com/OWNER/APP-REPO" class="btn btn-secondary">
      View on GitHub
    </a>
  </div>

  <!-- Per-platform asset links -->
  <div class="assets" id="assets"></div>
  <p id="error" class="error" hidden></p>

  <script>
    const OWNER = 'rgh-helm';         // ← your GitHub username
    const REPO = 'Helm';     // ← your app repo name

    // Guess the best asset for the visitor's OS (best-effort)
    function pickPrimary(assets) {
      const ua = navigator.userAgent.toLowerCase();
      const prefs = ua.includes('win') ? ['.exe', '.msi', '-windows'] :
        ua.includes('mac') ? ['.dmg', '-macos', '-mac'] :
          ['.appimage', '.deb', '-linux'];
      for (const p of prefs)
        for (const a of assets)
          if (a.name.toLowerCase().includes(p)) return a;
      return assets[0]; // fallback
    }

    async function loadRelease() {
      try {
        const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/releases/latest`);
        if (!res.ok) throw new Error(`GitHub API ${res.status}`);
        const data = await res.json();

        const version = data.tag_name;                      // e.g. "v1.4.2"
        const assets = data.assets;                        // downloadable files
        const primary = assets.length ? pickPrimary(assets) : null;

        document.getElementById('version').textContent = version;

        if (primary) {
          document.getElementById('download-btn').href = primary.browser_download_url;
        } else {
          // Fall back to the release page itself
          document.getElementById('download-btn').href = data.html_url;
        }

        // List all assets as secondary links
        const container = document.getElementById('assets');
        for (const asset of assets) {
          const a = document.createElement('a');
          a.href = asset.browser_download_url;
          a.className = 'asset-link';
          a.textContent = `${asset.name} (${(asset.size / 1e6).toFixed(1)} MB)`;
          container.appendChild(a);
        }

      } catch (err) {
        document.getElementById('version').textContent = '';
        document.getElementById('download-btn').href = `https://github.com/${OWNER}/${REPO}/releases`;
        document.getElementById('download-btn').textContent = 'View Releases';
        document.getElementById('error').hidden = false;
        document.getElementById('error').textContent = 'Could not load latest release. ' + err.message;
      }
    }

    loadRelease();
  </script>
</body>

</html>
